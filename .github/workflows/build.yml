name: Build Jiter (Fixed Nuclear Option)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Maturin & Zig
        run: pip install "maturin[zig]"

      - name: Install Rust Target (This was missing!)
        run: rustup target add aarch64-unknown-linux-musl

      - name: Download Jiter Source
        run: |
          pip download jiter --no-binary=:all: --no-deps
          mkdir jiter_src
          tar -xzf jiter-*.tar.gz -C jiter_src --strip-components=1

      - name: Build Static MUSL Wheel
        working-directory: jiter_src
        run: |
          # Build for generic Linux (Musl)
          # Zig handles the C-linking, Rust handles the code.
          maturin build --release --target aarch64-unknown-linux-musl --zig -i python3.12 --out ../dist

      - name: Rename Wheel for Android
        run: |
          cd dist
          # The file will likely be named: jiter-0.8.0-cp312-cp312-musllinux_1_2_aarch64.whl
          WHEEL_NAME=$(ls *.whl)
          echo "Original Name: $WHEEL_NAME"
          
          # We extract the version number from the filename
          # (Assumes standard naming: package-version-...)
          VERSION=$(echo $WHEEL_NAME | cut -d- -f2)
          
          # We force the name to be an Android ABI3 wheel.
          # This tells Pip: "I am compatible with Python 3.8+ on Android ARM64"
          NEW_NAME="jiter-${VERSION}-cp38-abi3-android_24_aarch64.whl"
          
          mv "$WHEEL_NAME" "$NEW_NAME"
          echo "Created compatible Android wheel: $NEW_NAME"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: jiter-android-wheel
          path: dist/*.whl
