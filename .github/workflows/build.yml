name: Build Jiter Android
on: [workflow_dispatch]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Flatten Source
        run: |
          # Download the latest stable source from PyPI
          pip download jiter --no-binary=:all: --no-deps
          mkdir src_dir
          # Extract and remove the top-level folder so Cargo.toml is at the root
          tar -xzf jiter-*.tar.gz -C src_dir --strip-components=1

      - name: Build Wheel
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          working-directory: src_dir
          # This specifies the exact container that has Android Python configs.
          # GitHub handles the multi-gigabyte download on their end.
          container: ghcr.io/rust-cross/maturin:main
          args: --release --out ../dist --find-interpreter

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiter-android-wheel
          path: dist/*.whl
