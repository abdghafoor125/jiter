name: Build Jiter (Nuclear Option)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Maturin & Zig
        run: pip install "maturin[zig]"

      - name: Download Jiter Source (Bypass Workspace Error)
        run: |
          # We download the source from PyPI to avoid the Cargo.toml workspace error
          pip download jiter --no-binary=:all: --no-deps
          mkdir jiter_src
          tar -xzf jiter-*.tar.gz -C jiter_src --strip-components=1

      - name: Build Static MUSL Wheel
        working-directory: jiter_src
        run: |
          # We build for Generic Linux (Musl). 
          # Maturin accepts this because it has standard config for Musl.
          maturin build --release --target aarch64-unknown-linux-musl --zig -i python3.12 --out ../dist

      - name: Rename Wheel for Android
        run: |
          cd dist
          # The file will look like: jiter-0.8.0-cp312-cp312-musllinux_1_2_aarch64.whl
          WHEEL_NAME=$(ls *.whl)
          
          # We force-rename the platform tag from 'musllinux...' to 'android...'
          # 'abi3' ensures it works on Python 3.8+
          # 'android_24' ensures pip accepts it as compatible
          
          # Construct the new name manually to be safe:
          # jiter-[version]-cp38-abi3-android_24_aarch64.whl
          
          VERSION=$(echo $WHEEL_NAME | cut -d- -f2)
          NEW_NAME="jiter-${VERSION}-cp38-abi3-android_24_aarch64.whl"
          
          mv "$WHEEL_NAME" "$NEW_NAME"
          echo "Created compatible Android wheel: $NEW_NAME"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: jiter-android-wheel
          path: dist/*.whl
