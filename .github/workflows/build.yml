name: Build Jiter Android (Stable Version Fix)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust & Target
        run: |
          rustup target add aarch64-linux-android

      - name: Install Maturin & Zig
        run: |
          pip install "maturin[zig]"

      - name: Download STABLE Jiter Source
        run: |
          # We force version 0.8.2 which is the industry standard and stable.
          # v0.13.0 is experimental and contains the Rust traits error you saw.
          pip download jiter==0.8.2 --no-binary=:all: --no-deps
          mkdir src_dir
          tar -xzf jiter-0.8.2.tar.gz -C src_dir --strip-components=1

      - name: Create PyO3 Configuration
        run: |
          cat <<EOF > $GITHUB_WORKSPACE/pyo3_config.txt
          implementation=CPython
          version=3.12
          shared=true
          abi3=true
          EOF

      - name: Build Wheel
        working-directory: src_dir
        run: |
          export PYO3_CONFIG_FILE="$GITHUB_WORKSPACE/pyo3_config.txt"
          export PYO3_NO_PYTHON=1
          
          maturin build \
            --release \
            --target aarch64-linux-android \
            --zig \
            --out ../dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiter-android-wheel
          path: dist/*.whl
