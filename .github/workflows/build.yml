name: Build Jiter Android Wheel
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download official jiter source from PyPI
        run: |
          pip download jiter --no-binary=:all: --no-deps
          mkdir jiter_src
          # Extract the downloaded .tar.gz source directly into the folder
          tar -xzf jiter-*.tar.gz -C jiter_src --strip-components=1

      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64-linux-android
          working-directory: jiter_src
          args: --release --out dist -m crates/jiter/Cargo.toml


      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: android-wheel
          path: dist/*.whl
