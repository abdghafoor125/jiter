name: Build Jiter Android Wheel

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.12'

      - name: Install Maturin & Zig linker
        run: |
          pip install "maturin[zig]"
          rustup target add aarch64-linux-android

      - name: Download official jiter source from PyPI
        run: |
          pip download jiter --no-binary=:all: --no-deps
          mkdir jiter_src
          tar -xzf jiter-*.tar.gz -C jiter_src --strip-components=1

      - name: Build Android Wheel natively
        working-directory: jiter_src
        run: |
          maturin build --release --target aarch64-linux-android --zig -i python3.12 --out ../dist



      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: android-wheel
          path: dist/*.whl
