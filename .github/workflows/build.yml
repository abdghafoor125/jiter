name: Build Jiter Android (Fix Absolute Path)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust & Target
        run: |
          rustup target add aarch64-linux-android

      - name: Install Maturin & Zig
        run: |
          pip install "maturin[zig]"

      - name: Download Jiter Source
        run: |
          pip download jiter --no-binary=:all: --no-deps
          mkdir src_dir
          tar -xzf jiter-*.tar.gz -C src_dir --strip-components=1

      - name: Create PyO3 Configuration
        run: |
          cat <<EOF > $GITHUB_WORKSPACE/pyo3_config.txt
          implementation=CPython
          version=3.8
          shared=true
          abi3=true
          EOF

      - name: Build Wheel
        working-directory: src_dir
        run: |
          # The fix: Using GITHUB_WORKSPACE to ensure the path is absolute
          export PYO3_CONFIG_FILE="$GITHUB_WORKSPACE/pyo3_config.txt"
          export PYO3_NO_PYTHON=1
          
          maturin build \
            --release \
            --target aarch64-linux-android \
            --zig \
            --out ../dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiter-android-wheel
          path: dist/*.whl
